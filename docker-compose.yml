services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    volumes:
      - ./Configuration/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
      - kafka_data:/var/lib/kafka/data # 1. Add this volume mapping
    ports:
      - 9094:9094
    environment:
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_LOG_DIRS: /var/lib/kafka/data # 2. Force Kafka to use the volume path
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server broker:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net
  compiler-service:
    user: root
    image: binhhvt/bnoj:5.0
    container_name: bnoj-compiler-service 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - problem_data:/app/problems
    networks:
      - kafka-net
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - Kafka__ProducerSettings__BootstrapServers=broker:9092
      - Kafka__ConsumerSettings__BootstrapServers=broker:9092
      - Kafka__Topics__SubmissionTopic=compiler.submission.request
      - Kafka__Topics__ResultTopic=compiler.submission.response
      - CompilerConfig__Image=binhhvt/oj
      - CompilerConfig__Version=3.0
      - AWS__S3__AccessKey=
      - AWS__S3__SecretKey=
    depends_on:
      - broker
