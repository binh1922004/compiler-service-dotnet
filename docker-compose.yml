services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    volumes:
      - ./Configuration/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf
    ports:
      - 9094:9094
    environment:
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Lắng nghe trên mọi interface (0.0.0.0) thay vì chỉ localhost
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      # Quảng bá: Dùng 'broker:9092' cho mạng nội bộ Docker, 'localhost:9094' cho máy Host
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Dùng tên container thay vì localhost
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server broker:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net
  compiler-service:
    user: root
    image: binhhvt/bnoj:1.0
    container_name: bnoj-compiler-service 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - problem_data:/app/problems
    networks:
      - kafka-net
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - Kafka__ProducerSettings__BootstrapServers=broker:9092
      - Kafka__ConsumerSettings__BootstrapServers=broker:9092
    depends_on:
      - broker
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8081:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      # Cấu hình để Kafka UI TỰ ĐỘNG kết nối với Broker nội bộ
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092
    networks:
      - kafka-net
    depends_on:
      - broker

networks:
  kafka-net:
    driver: bridge
volumes:
  submission_data:
    name: submission_data
  problem_data:
    name: problem_data